name: Deploy Tickle website

on:
  push:
    branches:
      - master
    paths:
      - apps/tickle_website/**
      - .github/workflows/deploy-website.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/tickle_website/package-lock.json

      - name: Install dependencies
        working-directory: apps/tickle_website
        run: npm ci

      - name: Build site
        working-directory: apps/tickle_website
        env:
          PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.PUBLIC_GA_MEASUREMENT_ID }}
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/tickle_website/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
